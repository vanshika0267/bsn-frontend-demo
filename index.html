<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BSN | BioPay Student Network</title>
    <meta name="description" content="BSN (BioPay Student Network) is a modern academic portfolio and networking platform for students. Share resources, verify skills, and discover internships." />
    <script>
      (function() {
        try {
          var settings = localStorage.getItem('bsn_settings');
          if (settings) {
            var parsed = JSON.parse(settings);
            if (parsed.darkMode === false) {
              document.documentElement.classList.remove('dark');
            } else {
              document.documentElement.classList.add('dark');
            }
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
